#:schema https://json.schemastore.org/any.json
#:tombi schema.strict = false

root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/app ./cmd/app"
entrypoint = "./tmp/app"
delay = 1000
exclude_dir = ["tmp", "vendor", "docs", "data"]
exclude_regex = ["_test\\.go"]
include_ext = ["go", "json", "env"]
stop_on_error = true

[build.windows]
cmd = "go build -o ./tmp/app.exe ./cmd/app"
entrypoint = "./tmp/app.exe"

[log]
time = true

[misc]
clean_on_exit = true
