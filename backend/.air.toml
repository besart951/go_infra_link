#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/app.exe ./cmd/app"
bin = "./tmp/app.exe"
delay = 1000
exclude_dir = ["tmp", "vendor", "docs", "data"]
exclude_regex = ["_test.go"]
include_ext = ["go", "json", "env"]
kill_delay = "500ms"
send_interrupt = true
stop_on_error = true

[log]
time = true

[misc]
clean_on_exit = true
