services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    env_file:
      - .env
    environment:
      - HTTP_ADDR=:${BACKEND_PORT:-8080}
      - DATABASE_URL=host=${POSTGRES_SERVICE_HOST:-postgres} user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-go_infra_link} port=${POSTGRES_CONTAINER_PORT:-5432} sslmode=disable
    volumes:
      - ./backend:/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web-main:
    build:
      context: .
      dockerfile: apps/web-main/Dockerfile
      target: dev
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_INTERNAL_PORT:-5173}"
    environment:
      - NODE_ENV=${APP_ENV:-development}
      - BACKEND_URL=http://api:${BACKEND_PORT:-8080}
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - FRONTEND_INTERNAL_PORT=${FRONTEND_INTERNAL_PORT:-5173}
      - CI=true
    volumes:
      - .:/workspace
      - web_main_root_node_modules:/workspace/node_modules
      - web_main_app_node_modules:/workspace/apps/web-main/node_modules
      - web_main_ui_svelte_node_modules:/workspace/packages/ui-svelte/node_modules
      - web_main_theme_node_modules:/workspace/packages/theme/node_modules
      - web_main_i18n_node_modules:/workspace/packages/i18n/node_modules
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-go_infra_link}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-p", "${POSTGRES_CONTAINER_PORT:-5432}"]
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_CONTAINER_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -p ${POSTGRES_CONTAINER_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_SERVER_JSON_FILE: /tmp/servers.json
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /tmp/pgpass <<EOF
        postgres:${POSTGRES_CONTAINER_PORT:-5432}:${POSTGRES_DB:-go_infra_link}:${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}
        EOF
        chmod 600 /tmp/pgpass

        cat > /tmp/servers.json <<EOF
        {
          "Servers": {
            "1": {
              "Name": "${PGADMIN_SERVER_NAME:-go_infra_link}",
              "Group": "Servers",
              "Host": "postgres",
              "Port": ${POSTGRES_CONTAINER_PORT:-5432},
              "MaintenanceDB": "${POSTGRES_DB:-go_infra_link}",
              "Username": "${POSTGRES_USER:-postgres}",
              "PassFile": "/tmp/pgpass",
              "SSLMode": "prefer"
            }
          }
        }
        EOF

        exec /entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  web_main_root_node_modules:
  web_main_app_node_modules:
  web_main_ui_svelte_node_modules:
  web_main_theme_node_modules:
  web_main_i18n_node_modules:
  pgadmin_data:
