when:
  - event: [push, pull_request]

steps:
  backend_lint:
    image: golangci/golangci-lint:v2.10.1-alpine
    environment:
      GOMODCACHE: /woodpecker/src/.cache/go-mod
      GOCACHE: /woodpecker/src/.cache/go-build
    commands:
      - cd backend
      - golangci-lint run ./...

  backend_test_build:
    image: golang:1.25-alpine
    depends_on:
      - backend_lint
    environment:
      GOMODCACHE: /woodpecker/src/.cache/go-mod
      GOCACHE: /woodpecker/src/.cache/go-build
    commands:
      - cd backend
      - go test ./...
      - go build ./cmd/app

  frontend_ci:
    image: node:22-alpine
    environment:
      PNPM_STORE_DIR: /woodpecker/src/.cache/pnpm
    commands:
      - corepack enable
      - corepack prepare pnpm@10.8.1 --activate
      - CI=true pnpm install --frozen-lockfile
      - pnpm --dir apps/web-main check
      - pnpm --dir apps/web-main build
