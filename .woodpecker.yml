when:
  - event: [push, pull_request]

steps:
  backend_lint:
    image: golangci/golangci-lint:v2.10.1-alpine
    environment:
      GOMODCACHE: /woodpecker/src/.cache/go-mod
      GOCACHE: /woodpecker/src/.cache/go-build
    commands:
      - cd backend
      - golangci-lint run ./...

  backend_test_build:
    image: golang:1.25-alpine
    depends_on:
      - backend_lint
    environment:
      GOMODCACHE: /woodpecker/src/.cache/go-mod
      GOCACHE: /woodpecker/src/.cache/go-build
    commands:
      - cd backend
      - go test ./...
      - go build ./cmd/app

  frontend_ci:
    image: node:22-alpine
    environment:
      PNPM_STORE_DIR: /woodpecker/src/.cache/pnpm
    commands:
      - cd frontend
      - corepack enable
      - corepack prepare pnpm@10.8.1 --activate
      - CI=true pnpm install --frozen-lockfile
      - cp src/lib/server/backend.example.ts src/lib/server/backend.ts || true
      - cp src/lib/server/set-cookie.example.ts src/lib/server/set-cookie.ts || true
      - pnpm check
      - pnpm build

  build_backend_image:
    image: docker:28-cli-alpine3.22
    depends_on:
      - backend_test_build
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build --target runtime -t local/go-infra-backend:stable ./backend

  build_frontend_image:
    image: docker:28-cli-alpine3.22
    depends_on:
      - frontend_ci
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build --target runtime -t local/go-infra-frontend:stable ./frontend

  deploy_local:
    image: docker:28-cli-alpine3.22
    depends_on:
      - build_backend_image
      - build_frontend_image
    when:
      branch: main
      event: push
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/t8/server-setup:/srv/server-setup
    commands:
      - apk add --no-cache bash docker-cli-compose
      - /srv/server-setup/scripts/deploy-go-infra-local.sh
